<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/registerStyle.css}">
</head>
<body>
    <h2>Register</h2>
    <form th:action="@{/register}"
          method="post"
          th:object="${registerDto}">

        <input
                type="text"
                th:field="*{name}"
                placeholder="Name">

        <input
                type="email"
                th:field="*{email}"
                placeholder="Email">

        <input
                type="password"
                th:field="*{password}"
                placeholder="Password">

        <button type="submit">
            Register
        </button>
    </form>

    <a th:href="@{/login}">
        Already have account?
    </a>
</body>
</html>
