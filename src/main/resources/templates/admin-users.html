<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>
</head>
<body>
    <h2>All Users</h2>
    <table border="1" cellpadding="8">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Action</th>
        </tr>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.name}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.role}"></td>
            <td>
                <form th:if="${user.role != 'ROLE_AUTHOR'}"
                      th:action="@{/admin/make-author/{id}(id=${user.id})}"
                      method="post" style="display:inline">
                    <button type="submit">Make Author</button>
                </form>
                <form th:if="${user.role == 'ROLE_AUTHOR'}"
                      th:action="@{/admin/make-user/{id}(id=${user.id})}"
                      method="post" style="display:inline">
                    <button type="submit">Make Normal User</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
