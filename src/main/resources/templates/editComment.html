<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Comment</title>
    <link rel="stylesheet" th:href="@{/css/editComment.css}">
</head>
<body>
<div class="edit-comment-container">
    <h2>Edit Comment</h2>
    <form th:action="@{/comments/update/{id}(id=${comment.id})}"
          method="post">
        <div class="form-group">
            <label>Name</label>
            <input type="text"
                   name="name"
                   th:value="${comment.name}"
                   required>
        </div>
        <div class="form-group">
            <label>Comment</label>
            <textarea name="comment"
                      rows="6"
                      required
                      th:text="${comment.comment}">
            </textarea>
        </div>
        <div class="button-group">
            <button type="submit" class="update-btn">
                Update Comment
            </button>
            <a th:href="@{/home/blog/{id}(id=${comment.posts.id})}"
               class="cancel-btn">
                Cancel
            </a>
        </div>
    </form>
</div>
</body>
</html>
