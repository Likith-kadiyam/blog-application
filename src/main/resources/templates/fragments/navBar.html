<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<nav th:fragment="navBar">
    <div class="outer-div">

        <div class="inner-divs">
            <a href="/home">Home</a>
        </div>

        <div class="inner-divs">
            <a href="/tag">Tags</a>
        </div>

        <div class="inner-divs" sec:authorize="hasAnyRole('AUTHOR','ADMIN')">
            <a href="/home/createBlog">Upload Blog</a>
        </div>

        <form th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />
            <button type="submit">
                Logout
            </button>
        </form>

    </div>
</nav>
</body>
</html>
